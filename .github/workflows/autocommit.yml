name: Auto Commit

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  autocommit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4        # ← Updated from v3 to v4

      - name: Make a change
        run: |
          echo "Last updated: $(date)" >> log.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Auto commit: $(date)"
          git push origin HEAD:${{ github.ref_name }}   # ← Explicit push target
